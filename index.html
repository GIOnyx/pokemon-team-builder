<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pokeball.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotom Dex | Team Builder</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Background Pokemon GBA Soundtrack -->
    <iframe id="bg-music" src="https://www.youtube.com/embed/M57A7vNq-lY?enablejsapi=1&autoplay=0&loop=1&playlist=M57A7vNq-lY" allow="autoplay" style="display:none" title="Pokemon GBA Soundtrack"></iframe>
    <script>
      let bgMusicPlayed = false;
      document.addEventListener('click', () => {
        if (!bgMusicPlayed) {
          bgMusicPlayed = true;
          const iframe = document.getElementById('bg-music');
          if (iframe && iframe.contentWindow) {
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
          }
        }
      }, { once: true });
    </script>
  </body>
</html>
