<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pokeball.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotom Dex | Team Builder</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Background Pokemon GBA Soundtrack -->
    <audio id="bg-music" src="/littleroot.webm" autoplay loop></audio>
    <script>
      let bgMusicPlayed = false;
      document.addEventListener('click', () => {
        if (!bgMusicPlayed) {
          bgMusicPlayed = true;
          const audio = document.getElementById('bg-music');
          if (audio) {
            audio.volume = 0.5;
            audio.play().catch(e => console.log("Audio play failed:", e));
          }
        }
      }, { once: true });
    </script>
  </body>
</html>
